<!DOCTYPE html>
<html>
<head>
    <script src="generic.js" defer></script>
    <script src="music.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="generic.css">
    <link rel="stylesheet" href="music.css">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Welcome</title>
</head>
<body>
<div class="page">
  <!-- AUDIO / TV SECTION -->
  <section class="audio-section">
    <div class="tv">
      <img src="Saw.jpg" class="screen">
      <div id="subtitles"></div>
    </div>

    <div class="controls">
      <div class="panel">
        <button class="btn" id="startBtn">START</button>
        <button class="btn" id="stopBtn">STOP</button>
        <button class="btn" id="restartBtn">RESET</button>
      </div>
    </div>

    <audio id="audio" src="music.wav"></audio>
  </section>

  <section>
  <div class="tracks">
    <div class="track">
  <button class="track-btn" data-audio="m1">▶ TRACK 01</button>
  <audio id="m1" src="dancingqueen.m4a"></audio>
</div>
<div class="track">
  <button class="track-btn" data-audio="m2">▶ TRACK 02</button>
  <audio id="m2" src="Electioneering.mp3"></audio>
</div>
   <div class="no-audio">
  AUDIO CORRUPTED
</div>
<div class="track">
  <button class="track-btn" data-audio="m3">▶ TRACK 03</button>
  <audio id="m3" src="ItalySong.mp3"></audio>
</div>
      <div class="track">
  <button class="track-btn" data-audio="m4">▶ TRACK 04</button>
  <audio id="m4" src="OneShortDay.mp3"></audio>
</div>
<div class="track">
  <button class="track-btn" data-audio="m5">▶ TRACK 05</button>
  <audio id="m5" src="Secret.mp3"></audio>
</div>
  </div>
  </section>

  <div class="music-code-section">
  <div class="code-boxes">
    <input class="code-digit" maxlength="1">
    <input class="code-digit" maxlength="1">
    <input class="code-digit fixed-digit" value="0" readonly>
    <input class="code-digit" maxlength="1">
    <input class="code-digit" maxlength="1">
    <input class="code-digit" maxlength="1">
  </div>

  <button id="checkMusicBtn" class="danger-btn">VERIFY CODE</button>

  <div id="musicResult"></div>
</div>
</div>
</body>
</html>
