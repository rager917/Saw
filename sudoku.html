<!DOCTYPE html>
<html>
<head>
    <script src="generic.js" defer></script>
    <script src="sudoku.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="generic.css">
    <link rel="stylesheet" href="sudoku.css">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Welcome</title>
</head>
<body>
<div class="page">
  <!-- AUDIO / TV SECTION -->
  <section class="audio-section">
    <div class="tv">
      <img src="Saw.jpg" class="screen">
      <div id="subtitles"></div>
    </div>

    <div class="controls">
      <div class="panel">
        <button class="btn" id="startBtn">START</button>
        <button class="btn" id="stopBtn">STOP</button>
        <button class="btn" id="restartBtn">RESET</button>
      </div>
    </div>

    <audio id="audio" src="sudoku.wav"></audio>
    <audio id="SawSoundTrack" src="SawSoundTrack.mp3" loop></audio>
  </section>

  <!-- SUDOKU SECTION -->
  <section class="sudoku-section">
    <div class="sudoku-container">
      <div id="timer">5:00</div>
      <div id="sudoku"></div>
    <button id="startSudokuBtn" class="danger-btn">START GAME</button>
    <button id="revealSudokuBtn" class="danger-btn">REVEAL SUDOKU</button>
      <button id="checkSudokuBtn" class="danger-btn">VERIFY</button>
      <div id="sudokuResult"></div>
    </div>
  </section>
</div>
</body>
</html>
